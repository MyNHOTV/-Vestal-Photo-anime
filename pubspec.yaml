name: flutter_quick_base
description: A lean Flutter base for 2–4 week projects
publish_to: 'none'
version: 0.1.0+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.5.0+1
  logger: ^2.4.0
  easy_localization: ^3.0.5
  flutter_dotenv: ^5.1.0
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5
  intl: ^0.20.2
  carousel_slider: ^5.1.1
  share_plus: ^12.0.1
  path_provider: ^2.1.4
  flutter_svg: ^2.2.2
  permission_handler: ^11.3.1
  keyboard_dismisser: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
#  gallery_saver_plus: ^2.0.0
  gal: ^2.0.0
  image: ^4.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  google_mobile_ads: ^6.0.0

  # Firebase packages
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.4
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.3
  flutter_spinkit: ^5.2.2
  dotted_border: ^3.1.0
  percent_indicator: ^4.2.5
  screen_protector: ^1.4.7
  screenshot: ^3.0.0
  firebase_analytics: ^11.3.3
  firebase_app_check: ^0.3.1+2
  firebase_messaging: ^15.1.3
  back_button_interceptor: ^8.0.4
  visibility_detector: ^0.4.0+2
  flutter_launcher_icons: ^0.14.4
  app_settings: ^7.0.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0  
  firebase_database: ^11.1.5
  shimmer: ^3.0.0
  video_player: ^2.9.2
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.1.5
  lottie: ^3.1.0
  appsflyer_sdk: ^6.12.0
  appmetrica_plugin: ^3.4.0
  # Ad Mediation Packages
  gma_mediation_liftoffmonetize: ^1.4.1
  gma_mediation_meta: ^1.5.0
  gma_mediation_mintegral: ^2.0.1
  gma_mediation_pangle: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - .env.dev
    - .env.stg
    - .env.prod
    - assets/icons/
    - assets/image/
    - assets/image/category_action/
    - assets/image/category_cute/
    - assets/image/category_dreamy_fantasy/
    - assets/image/category_life_style/
    - assets/image/category_trending/
  fonts:
    - family: SwissNowTrial
      fonts:
        - asset: fonts/SwissNowTrial-Thin.otf
          weight: 100
        - asset: fonts/SwissNowTrial-ThinItalic.otf
          weight: 100
          style: italic
        - asset: fonts/SwissNowTrial-ExtraLight.otf
          weight: 200
        - asset: fonts/SwissNowTrial-ExtLtIta.otf
          weight: 200
          style: italic
        - asset: fonts/SwissNowTrial-Light.otf
          weight: 300
        - asset: fonts/SwissNowTrial-LightItalic.otf
          weight: 300
          style: italic
        - asset: fonts/SwissNowTrial-Regular.otf
          weight: 400
        - asset: fonts/SwissNowTrial-Italic.otf
          weight: 400
          style: italic
        - asset: fonts/SwissNowTrial-Medium.otf
          weight: 500
        - asset: fonts/SwissNowTrial-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/SwissNowTrial-SemiBold.otf
          weight: 600
        - asset: fonts/SwissNowTrial-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: fonts/SwissNowTrial-Bold.otf
          weight: 700
        - asset: fonts/SwissNowTrial-BoldItalic.otf
          weight: 700
          style: italic
        - asset: fonts/SwissNowTrial-ExtraBold.otf
          weight: 800
        - asset: fonts/SwissNowTrial-ExtraBoldItalic.otf
          weight: 800
          style: italic
        - asset: fonts/SwissNowTrial-Book.otf
          weight: 400
        - asset: fonts/SwissNowTrial-BookItalic.otf
          weight: 400
          style: italic
        - asset: fonts/SwissNowTrial-Black.otf
          weight: 900
        - asset: fonts/SwissNowTrial-BlackItalic.otf
          weight: 900
          style: italic

# flutter pub run flutter_launcher_icons:main
flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icons/logo.png"

  adaptive_icon_foreground: "assets/icons/logo.png"
  adaptive_icon_background: "#FFFFFF"
